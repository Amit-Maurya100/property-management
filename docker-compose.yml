services:
  postgres:
    image: postgres:16-alpine
    container_name: property-management-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: property
      POSTGRES_PASSWORD: property
      POSTGRES_DB: property_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U property -d property_management"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
